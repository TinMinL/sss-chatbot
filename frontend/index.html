<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot Demo - Secondary School</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .chat-container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .chat-box { height: 400px; border: 1px solid #ccc; margin-bottom: 15px; padding: 10px; overflow-y: auto; background-color: #fafafa; }
        .input-group { display: flex; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px 0 0 5px; }
        button { padding: 10px 20px; background-color: #0056b3; color: white; border: none; border-radius: 0 5px 5px 0; cursor: pointer; }
        .loading { font-style: italic; color: #888; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h2 style="text-align: center; color: #333;">Secondary School AI Assistant</h2>
        <div class="chat-box" id="chatBox">
            <p><strong>System:</strong> Hello! I am your AI educational assistant. How can I help you with your studies today?</p>
        </div>
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Ask a question about your homework..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const message = input.value.trim();
            if (message === '') return;
            
            // 1. 显示用户输入
            chatBox.innerHTML += `<p><strong>You:</strong> ${message}</p>`;
            input.value = '';
            
            // 2. 显示加载状态
            const loadingId = 'loading-' + Date.now();
            chatBox.innerHTML += `<p id="${loadingId}" class="loading">AI Assistant is thinking...</p>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            // 3. 发送真实请求给 Python 后端
            try {
                const response = await fetch('http://localhost/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message, student_id: 's14238060' })
                });
                
                const data = await response.json();
                
                // 移除加载状态
                document.getElementById(loadingId).remove();

                // 4. 显示 AI 真实回复
                if(data.status === "success") {
                     chatBox.innerHTML += `<p><strong>AI Assistant:</strong> ${data.response}</p>`;
                } else {
                     chatBox.innerHTML += `<p style="color:red;"><strong>System Error:</strong> ${data.response}</p>`;
                }
               
            } catch (error) {
                document.getElementById(loadingId).remove();
                chatBox.innerHTML += `<p style="color:red;"><strong>Connection Error:</strong> Cannot reach the backend server. Make sure app.py is running.</p>`;
            }
            
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
